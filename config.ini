[paths]
; Path to the Excel extraction file produced by the OCR/classification pipeline
excel_file = ./assignment_test/output_test.xlsx

; Path to the ZIP archive containing the source PDFs to be split
pdf_zip = ./assignment_test/pdf_test_immagini.zip

; Directory where split PDF files will be written
output_pdf_dir = ./output/pdfs

; Directory where split Excel metadata files will be written
output_xls_dir = ./output/excels

; Path for the final ZIP collecting all outputs
output_zip = ./output/result.zip

[processing]
; How to handle pages classified as "Altro":
;   discard  — exclude Altro pages from all outputs
;   split    — each contiguous run of Altro pages becomes its own sub-document
;   group    — all Altro pages of a source PDF are grouped into one additional sub-document
altro_mode = split
